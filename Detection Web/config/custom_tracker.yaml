# ByteTrack custom configuration for Traffic Violation Detection
# Tăng track_buffer để giữ track_id của xe lâu hơn (hạn chế mất dấu)
tracker_type: bytetrack

# Core tracking parameters
track_high_thresh: 0.5      # Ngưỡng tin cậy cao cho active tracks
track_low_thresh: 0.1       # Ngưỡng thấp để giữ lost tracks sống
new_track_thresh: 0.6       # Ngưỡng để tạo track mới

# ── KEY FIX: Giữ ID xe tới 5 giây (150 frame × 30fps) khi bị che khuất ──
track_buffer: 150           # Mặc định là 30 — tăng lên 150 frames

# Matching parameters
match_thresh: 0.8           # Ngưỡng IoU để ghép track với detection

# Fuse detection score with IoU for matching (bắt buộc từ ultralytics ≥8.4)
fuse_score: True
