name: traffic_violation_app
description: Traffic Violation Detection & Fine Payment App
publish_to: 'none'
version: 1.0.29+27

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.1
  
  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  
  # Notifications & Firebase
  flutter_local_notifications: ^20.1.0
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.3.7
  firebase_analytics: ^11.3.6
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Date & Time
  intl: ^0.20.2
  
  # File System (for OTA update APK download)
  path_provider: ^2.1.2
  package_info_plus: ^9.0.0
  open_file: ^3.5.11
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/app_icon.png
    - assets/images/app_icon_login.png
